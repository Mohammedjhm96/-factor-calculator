<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iraqi Medical Board Factor Calculator</title>
    
    <!-- ربط الـ PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f4c81">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/0f4c81/ffffff?text=🩺">
    
    <!-- خط Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f4c81, #1e88e5);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .logo {
            font-size: 55px;
            margin-bottom: 10px;
            display: inline-block;
        }

        h1 {
            font-size: 20px;
            color: #0f4c81;
            margin-bottom: 8px;
            font-weight: 700;
            direction: ltr;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: right;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #444;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #1e88e5;
        }

        .btn-calc {
            width: 100%;
            background-color: #0f4c81;
            color: white;
            border: none;
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-calc:hover {
            background-color: #0b3861;
        }

        .result-card {
            background: #f0f7ff;
            border: 2px dashed #1e88e5;
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 16px;
            color: #0f4c81;
            font-weight: 500;
        }

        .result-value {
            font-size: 38px;
            font-weight: 700;
            color: #e65100;
            margin: 5px 0;
        }

        .saved-badge {
            font-size: 12px;
            color: #2e7d32;
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background: #f5f5f5;
        }

        .footer {
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            direction: ltr;
        }

        .footer a {
            color: #fff;
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="logo">🩺</span>
        <h1>Iraqi Medical Board Factor Calculator</h1>
        <p class="subtitle">احسب الفاكتر التنافسي والدرجة من 30 بدقة حسب ضوابط البورد.</p>

        <!-- حقول الإدخال الثلاثة المعتمدة على الشرح -->
        <div class="input-group">
            <label for="score">1. معدل التخرج الطبي (%)</label>
            <input type="number" id="score" placeholder="مثال: 80" step="0.01" min="0" max="100">
        </div>

        <div class="input-group">
            <label for="rank">2. تسلسلك على الدفعة</label>
            <input type="number" id="rank" placeholder="مثال: 2" min="1">
        </div>

        <div class="input-group">
            <label for="totalStudents">3. العدد الكلي لطلاب الدفعة</label>
            <input type="number" id="totalStudents" placeholder="مثال: 100" min="1">
        </div>

        <button class="btn-calc" onclick="calculateFactor()">احسب النتيجة</button>

        <!-- كارد النتيجة المحسن -->
        <div class="result-card" id="resultCard">
            <div class="result-title">الدرجة النهائية للبورد (من 30)</div>
            <div class="result-value" id="factorValue">0.00</div>
            <div class="saved-badge" id="saveStatus">✓ تم حفظ البيانات تلقائياً</div>
            
            <div class="action-buttons">
                <button class="btn-action" onclick="resetForm()">🔄 إعادة تعيين</button>
                <button class="btn-action" onclick="shareResult()">🔗 مشاركة</button>
            </div>
        </div>
    </div>

    <div class="footer">
        Developed by <a href="#">Dr. Mohammed Jasim</a>
    </div>

    <script>
        function calculateFactor() {
            const score = parseFloat(document.getElementById('score').value);
            const rank = parseInt(document.getElementById('rank').value);
            const total = parseInt(document.getElementById('totalStudents').value);

            // التحقق من المدخلات
            if (!score || score < 0 || score > 100 || !rank || !total || rank > total) {
                alert('الرجاء التأكد من إدخال قيم صحيحة، وأن يكون التسلسل أقل من أو يساوي عدد طلاب الدفعة.');
                return;
            }

            // تطبيق المعادلة حسب الشرح المرفق:
            // 1. النصف الأول المعتمد على المعدل
            const part1 = score / 2;

            // 2. النصف الثاني المعتمد على التسلسل والعدد الكلي
            const rankRatio = rank / total;
            const subResult = 1 - rankRatio;
            const part2 = (subResult * 100) / 2;

            // 3. جمع الجزئين والضرب في 0.30 للحصول على الدرجة من 30
            const totalSum = part1 + part2;
            const finalFactor = (totalSum * 0.30).toFixed(3);

            // عرض النتيجة
            document.getElementById('factorValue').innerText = finalFactor;
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('saveStatus').innerText = '✓ تم حفظ النتيجة تلقائياً';

            // حفظ في الـ LocalStorage
            localStorage.setItem('saved_score', score);
            localStorage.setItem('saved_rank', rank);
            localStorage.setItem('saved_total', total);
            localStorage.setItem('saved_factor', finalFactor);
        }

        window.onload = function() {
            const s = localStorage.getItem('saved_score');
            const r = localStorage.getItem('saved_rank');
            const t = localStorage.getItem('saved_total');
            const f = localStorage.getItem('saved_factor');
            
            if (s && r && t && f) {
                document.getElementById('score').value = s;
                document.getElementById('rank').value = r;
                document.getElementById('totalStudents').value = t;
                document.getElementById('factorValue').innerText = f;
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('saveStatus').innerText = '✓ تم استعادة آخر نتيجة محفوظة';
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(console.error);
            }
        };

        function resetForm() {
            document.getElementById('score').value = '';
            document.getElementById('rank').value = '';
            document.getElementById('totalStudents').value = '';
            document.getElementById('resultCard').style.display = 'none';
            localStorage.clear();
        }

        function shareResult() {
            const factor = document.getElementById('factorValue').innerText;
            const shareText = `حسبت فاكتر البورد العراقي وطلعت النتيجة ${factor} من 30! احسب فاكتر تخرجك الآن عبر الحاسبة الإلكترونية:`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'حاسبة فاكتر البورد العراقي',
                    text: shareText,
                    url: window.location.origin + window.location.pathname
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(`${shareText}\n${window.location.href}`);
                alert('تم نسخ النتيجة والرابط للحافظة لمشاركتها!');
            }
        }
    </script>
</body>
</html>
